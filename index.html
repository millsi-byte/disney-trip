<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1B2B4A;--cream:#F7F4EF;--card:#fff;--muted:#6B7280;--border:#E5E1D8;--r:14px;
  --mk:#6B4FA0;--ep:#0077A8;--hs:#C24530;--ak:#3B7549;--trv:#8C9BAA;
  --gold:#B8892A;--gold-lt:#FEF3C7;--gold-dk:#78350F;
}
html,body{margin:0;padding:0}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--cream);color:var(--ink);max-width:430px;margin:0 auto}#root{display:block}
/* Header */
.hdr{background:var(--ink);color:#fff;padding:calc(16px + env(safe-area-inset-top)) 18px 14px;position:sticky;top:0;z-index:100}
.hdr-title{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;letter-spacing:-0.01em}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
/* Day strip */
.strip-wrap{background:var(--ink);padding:0 14px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.strip-wrap::-webkit-scrollbar{display:none}
.strip{display:flex;gap:6px}
.dpill{display:flex;flex-direction:column;align-items:center;padding:8px 10px 7px;border-radius:10px;cursor:pointer;border:2px solid transparent;background:rgba(255,255,255,.08);min-width:54px;transition:all .15s;gap:2px}
.dpill.on{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.18)}
.p-day{font-size:11px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.p-date{font-size:19px;font-weight:700;color:#fff;line-height:1.1}
.p-bar{width:22px;height:4px;border-radius:2px;margin-top:3px}
.p-pk{font-size:11px;color:rgba(255,255,255,.9);font-weight:700;letter-spacing:.06em}
/* Scroll area */
#app{padding:12px 12px calc(72px + env(safe-area-inset-bottom))}
/* Hero */
.hero{border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.hero-body{padding:16px 18px 14px}
.h-date{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.75)}
.h-park{font-family:'Fraunces',Georgia,serif;font-size:27px;font-weight:700;color:#fff;margin:4px 0 2px;letter-spacing:-.02em;line-height:1.1}
.h-resort{font-size:14px;color:rgba(255,255,255,.7)}
.h-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.badge{font-size:12px;font-weight:700;padding:4px 10px;background:rgba(255,255,255,.22);border-radius:20px;letter-spacing:.04em;color:#fff;text-transform:uppercase}
.hero-alert{background:#7F1D1D;padding:10px 16px;display:flex;align-items:flex-start;gap:8px}
.hero-alert svg{color:#FCA5A5;flex-shrink:0;margin-top:1px}
.hero-alert-txt{font-size:14px;color:#FEE2E2;line-height:1.45}
/* Info bar */
.info-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;overflow:hidden;margin-bottom:10px}
.ib-cell{flex:1;padding:9px 11px;display:flex;flex-direction:column;gap:3px}
.ib-cell:not(:last-child){border-right:1px solid var(--border)}
.ib-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.ib-val{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.crowd-pill{display:inline-flex;align-items:center;gap:3px;font-size:13px;font-weight:700;padding:2px 7px;border-radius:8px}
.cpl-lt{background:#DCFCE7;color:#166534}
.cpl-md{background:#FEF3C7;color:#92400E}
.cpl-hv{background:#FEE2E2;color:#991B1B}
.ib-res{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.ib-res-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Cards */
.card{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.card-lbl{display:flex;align-items:center;gap:11px}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-size:16px;font-weight:600;color:var(--ink)}
.card-sub{font-size:13px;color:var(--muted);margin-top:1px}
.chev{color:var(--muted);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(90deg)}
.card-body{border-top:1px solid var(--border)}
/* Flight */
.flt-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:14px 16px;align-items:center}
.flt-side{display:flex;flex-direction:column}
.flt-side.right{text-align:right;align-items:flex-end}
.flt-apt{font-family:'Fraunces',Georgia,serif;font-size:30px;font-weight:700;letter-spacing:.02em;color:var(--ink)}
.flt-city{font-size:14px;color:var(--muted);margin-top:1px}
.flt-time{font-size:21px;font-weight:700;color:var(--ink);margin-top:5px}
.flt-date{font-size:13px;color:var(--muted)}
.flt-mid{display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:4px}
.flt-line{display:flex;align-items:center;gap:3px}
.flt-dash{flex:1;height:1px;background:var(--border);width:18px}
.flt-carrier{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.05em}
.flt-meta{display:flex;border-top:1px solid var(--border)}
.flt-meta-cell{flex:1;padding:10px 14px}
.flt-meta-cell:not(:last-child){border-right:1px solid var(--border)}
.flt-mlbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.flt-mval{font-size:18px;font-weight:700;color:var(--ink)}
/* Itinerary */
.plan-summary{padding:10px 14px;border-bottom:1px solid var(--border);font-size:15px;color:var(--muted);line-height:1.5}
.plan-summary strong{color:var(--ink);font-weight:700}
.t-row{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:flex-start}
.t-row:last-child{border-bottom:none}
.t-row.nextup{border-left:3px solid var(--gold);padding-left:11px;background:#FFFBEB}
.t-time{font-size:15px;font-weight:700;color:var(--muted);min-width:72px;flex-shrink:0;padding-top:2px;white-space:nowrap;letter-spacing:.02em}
.t-text{font-size:18px;line-height:1.45;color:var(--ink);flex:1}
.t-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.t-tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em;display:inline-flex;align-items:center;gap:3px}
.t-tag-next{background:var(--gold-lt);color:var(--gold-dk)}
.t-tag-flight{background:#DBEAFE;color:#1E40AF}
.t-tag-crit{background:#FEE2E2;color:#991B1B}
/* LL compact legend */
.ll-legend{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;background:#FAFAF9}
.ll-legend-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted)}
/* LL rows */
.ll-row{padding:11px 14px;border-bottom:1px solid var(--border)}
.ll-row:last-child{border-bottom:none}
.ll-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ll-ride{font-size:18px;font-weight:600;color:var(--ink)}
.ll-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.sp{background:#FEE2E2;color:#991B1B}
.mp1{background:#DBEAFE;color:#1E40AF}
.mp2{background:#D1FAE5;color:#065F46}
.ll-win{font-size:16px;color:var(--muted);margin-top:3px}
.ll-bd{font-size:14px;color:var(--gold);font-weight:700;margin-top:2px}
.roll-hd{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:9px 14px 5px;background:#FAFAF9}
.roll-row{padding:7px 14px;font-size:16px;display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid var(--border);color:var(--ink)}
.roll-row:last-child{border-bottom:none}
.roll-arr{color:var(--gold);flex-shrink:0;font-weight:700;margin-top:1px}
/* Dining */
.din-row{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.din-row:last-child{border-bottom:none}
.meal{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:#EEF2FF;color:var(--ink);padding:4px 8px;border-radius:6px;width:72px;text-align:center;flex-shrink:0}
.din-name{font-size:18px;font-weight:600;color:var(--ink)}
.din-time{font-size:15px;color:var(--muted);margin-top:1px}
.nonpark-badge{font-size:12px;font-weight:700;color:#fff;background:#6B7280;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0}
/* Shows */
.show-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.show-row:last-child{border-bottom:none}
.show-name{font-size:18px;font-weight:600}
.show-time{font-size:16px;color:var(--muted)}
/* Strategy */
.strategy-body{padding:14px;font-size:17px;line-height:1.75;color:#374151}
.strategy-body p{margin-bottom:10px}
.strategy-body p:last-child{margin-bottom:0}
/* Page headers */
.pg-title{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:3px}
.pg-sub{font-size:15px;color:var(--muted);margin-bottom:14px}
/* Schedule */
.sch-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.sch-card-hd{padding:12px 14px;display:flex;align-items:center;gap:10px}
.sch-day-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border)}
.sch-day-name{font-size:16px;font-weight:700}
.sch-day-date{font-size:13px;opacity:.8}
/* Lightning tab */
.llp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.llp-hd{padding:12px 14px;display:flex;align-items:center;gap:10px}
.llp-name{font-size:17px;font-weight:700}
.llp-book{font-size:14px;opacity:.85;margin-left:auto;white-space:nowrap}
.ll-full-legend{background:#FFFBEB;border-bottom:1px solid var(--border);padding:12px 14px}
.ll-full-legend h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:9px}
.llfl-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;font-size:15px;line-height:1.45;color:var(--ink)}
.llfl-item:last-child{margin-bottom:0}
/* Planning */
.seg{display:flex;background:var(--cream);border-radius:10px;padding:3px;gap:3px;border:1px solid var(--border);margin-bottom:0}
.seg-btn{flex:1;padding:8px;font-size:15px;font-weight:600;border:none;background:transparent;border-radius:8px;cursor:pointer;color:var(--muted);font-family:'Inter',sans-serif}
.seg-btn.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.plan-sticky{position:sticky;top:0;z-index:5;background:var(--cream);padding:0 0 10px}
.prog-label{font-size:14px;color:var(--muted);margin:8px 0 4px}
.prog-outer{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-inner{height:100%;background:var(--ink);border-radius:2px;transition:width .3s}
.prog-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
.prog-btn{font-size:11px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;font-family:'Inter',sans-serif}
.prog-btn.blu{color:#0077A8}
.cat-hdr{padding:11px 14px 7px;display:flex;align-items:center;justify-content:space-between}
.cat-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--ink)}
.cat-count{font-size:13px;color:var(--muted);font-weight:600}
.pk-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.chkbox{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;color:#fff}
.chkbox.on{background:var(--ink);border-color:var(--ink)}
.pk-name{font-size:18px;color:var(--ink);flex:1;cursor:pointer;line-height:1.3}
.pk-name.done{text-decoration:line-through;color:var(--muted)}
.lkr-tag{font-size:13px;font-weight:700;color:#92400E;background:#FEF3C7;padding:2px 7px;border-radius:6px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.qty-wrap{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0}
.qty-btn{width:44px;height:44px;border-radius:22px;border:1.5px solid var(--border);background:var(--cream);font-size:20px;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;font-family:'Inter',sans-serif}
.qty-btn:active{background:var(--border)}
.qty-num{font-size:17px;font-weight:700;min-width:20px;text-align:center}
.del-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:#CBD5E1;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0}
.del-btn:active{color:#ef4444}
.del-confirm-btn{font-size:13px;font-weight:700;padding:4px 8px;border-radius:8px;background:#FEE2E2;color:#991B1B;border:none;cursor:pointer;flex-shrink:0;white-space:nowrap;font-family:'Inter',sans-serif}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border)}
.add-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:14px;background:var(--cream);color:var(--ink);outline:none;min-width:0;font-family:'Inter',sans-serif}
.add-inp:focus{border-color:var(--ink)}
.add-ok{padding:7px 12px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.add-cancel{padding:7px 8px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.add-link{font-size:15px;color:#0077A8;background:none;border:none;cursor:pointer;padding:10px 14px;text-align:left;width:100%;border-top:1px dashed var(--border);font-weight:600;font-family:'Inter',sans-serif;display:block}
.td-when{font-size:13px;color:var(--muted);white-space:nowrap;font-weight:500;padding:2px 7px;background:#F3F4F6;border-radius:6px;flex-shrink:0}
.na-btn{font-size:13px;font-weight:700;padding:3px 7px;border-radius:8px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;font-family:'Inter',sans-serif;background:var(--cream);color:var(--muted)}
.na-btn.active{background:#E5E1D8;color:var(--ink)}
.h-res{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;letter-spacing:.03em}
.checkin-hotel{font-size:17px;font-weight:700;color:var(--ink);margin-top:3px}
.checkin-res{font-size:14px;color:var(--gold);font-weight:700;margin-top:2px;letter-spacing:.02em}
/* Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--cream);border-top:2px solid #B8B2A8;padding-bottom:env(safe-area-inset-bottom);z-index:200}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;color:#B0A898;font-size:11px;font-weight:600;letter-spacing:.04em;gap:3px;border:none;background:none;font-family:'Inter',sans-serif}
.nbtn.on{color:#4B5563}
.nbtn-dot{width:4px;height:4px;border-radius:50%;background:#4B5563}
</style>
</head>

function tagCls(ty){return ty==='sp'?'sp':ty==='mp1'?'mp1':'mp2';}
function tagLbl(ty){return ty==='sp'?'Single Pass':ty==='mp1'?'Multi Pass T1':'Multi Pass T2';}

function crowdPill(v){
  if(v===null)return '<span style="color:var(--muted);font-size:12px;font-style:italic">TBD</span>';
  var cls=v<=3?'cpl-lt':v<=6?'cpl-md':'cpl-hv';
  var lbl=v<=3?'Light':v<=6?'Moderate':'Heavy';
  return '<span class="crowd-pill '+cls+'">'+lbl+'</span><span style="font-size:10px;color:var(--muted);margin-left:3px">'+v+'/10</span>';
}

function firstSentence(s){
  if(!s)return'';
  var m=s.match(/^([^.!?]+[.!?])/);
  return m?m[1].trim():s.split('\n')[0].trim();
}

function pillifyText(txt){
  txt=txt.replace(/\(Single Pass[^)]*\)/g,'<span class="ll-tag sp">SP</span>');
  txt=txt.replace(/\(MP T1\)/g,'<span class="ll-tag mp1">T1</span>');
  txt=txt.replace(/\(MP T2\)/g,'<span class="ll-tag mp2">T2</span>');
  return txt;
}
function isFlightRow(it){
  return(it.crit&&(it.crit.toLowerCase().includes('flight')))||/^(Depart|Arrive)\b/.test(it.x);
}

function parseMinutes(ts){
  var m=ts.match(/^(\d+):(\d+)\s*(AM|PM)/i);if(!m)return -1;
  var h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;
  return h*60+mn;
}

function getNextUpIdx(day){
  var dates=['2026-07-14','2026-07-15','2026-07-16','2026-07-17','2026-07-18','2026-07-19'];
  var idx=['14','15','16','17','18','19'].indexOf(day.date);
  if(idx===-1)return -1;
  var now=new Date();
  // Approximate Eastern time (EDT = UTC-4 in July)
  var et=new Date(now.getTime()-4*60*60*1000);
  var todayET=et.getUTCFullYear()+'-'+String(et.getUTCMonth()+1).padStart(2,'0')+'-'+String(et.getUTCDate()).padStart(2,'0');
  if(todayET!==dates[idx])return -1;
  var nowMin=et.getUTCHours()*60+et.getUTCMinutes();
  for(var i=0;i<day.itin.length;i++){
    var mn=parseMinutes(day.itin[i].t);
    if(mn!==-1&&mn>=nowMin)return i;
  }
  return day.itin.length-1;
}

// ── RENDER PLANNING ───────────────────────────────────────────────────
function renderPlanning(){
  var pkDone=PKDATA.reduce(function(a,c){return a+c.items.filter(function(x){return x.done;}).length;},0);
  var pkTotal=PKDATA.reduce(function(a,c){return a+c.items.length;},0);
  var tdDone=TDDATA.filter(function(t){return t.done;}).length;
  var tdTotal=TDDATA.filter(function(t){return !t.na;}).length;
  var done=PLAN==='packing'?pkDone:tdDone;
  var total=PLAN==='packing'?pkTotal:tdTotal;
  var pct=total>0?Math.round(done/total*100):0;
  var o='';

  // Sticky header
  o+='<div class="plan-sticky">';
  o+='<div class="seg">';
  o+='<button class="seg-btn'+(PLAN==='packing'?' on':'')+'" onclick="sp(\'packing\')">Packing List</button>';
  o+='<button class="seg-btn'+(PLAN==='todo'?' on':'')+'" onclick="sp(\'todo\')">To Do</button>';
  o+='</div>';
  o+='<div class="prog-label">'+done+' of '+total+(PLAN==='packing'?' packed':' done')+'</div>';
  o+='<div class="prog-outer"><div class="prog-inner" style="width:'+pct+'%"></div></div>';
  o+='<div class="prog-actions">';
  if(PLAN==='packing'){
    o+='<button class="prog-btn blu" onclick="pk_save_template()">Save as Template</button>';
    o+='<button class="prog-btn" onclick="pk_reset()">Reset</button>';
  }else{
    o+='<button class="prog-btn blu" onclick="td_save_template()">Save as Template</button>';
    o+='<button class="prog-btn" onclick="td_reset()">Reset</button>';
  }
  o+='</div></div>';

  if(PLAN==='packing'){
    for(var c=0;c<PKDATA.length;c++){
      var cat=PKDATA[c];
      var catDone=cat.items.filter(function(x){return x.done;}).length;
      o+='<div class="card">';
      o+='<div class="cat-hdr"><div class="cat-name">'+cat.cat+'</div><div class="cat-count">'+catDone+'/'+cat.items.length+'</div></div>';
      for(var j=0;j<cat.items.length;j++){
        var it=cat.items[j],k=c+'-'+j,isPend=DEL_PK[k];
        o+='<div class="pk-row">';
        o+='<div class="chkbox'+(it.done?' on':'')+'" onclick="pk_chk('+c+','+j+')">'+(it.done?IC.checkw:'')+'</div>';
        o+='<div class="pk-name'+(it.done?' done':'')+'" onclick="pk_chk('+c+','+j+')">'+it.n+'</div>';
        if(it.l){
          o+='<span class="lkr-tag">Locker</span>';
        }else{
          o+='<div class="qty-wrap">';
          o+='<button class="qty-btn" onclick="pk_dec('+c+','+j+')">&#x2212;</button>';
          o+='<span class="qty-num">'+it.qty+'</span>';
          o+='<button class="qty-btn" onclick="pk_inc('+c+','+j+')">+</button>';
          o+='</div>';
        }
        if(isPend){
          o+='<button class="del-confirm-btn" onclick="pk_del('+c+','+j+')">Remove?</button>';
        }else{
          o+='<button class="del-btn" onclick="pk_del('+c+','+j+')">&#xd7;</button>';
        }
        o+='</div>';
      }
      if(ADDING_CAT===c){
        o+='<div class="add-row"><input id="pk-inp" class="add-inp" placeholder="Item name..." onkeydown="pk_inp_key(event,'+c+')">';
        o+='<button class="add-ok" onclick="pk_ok('+c+')">Add</button>';
        o+='<button class="add-cancel" onclick="pk_cancel()">&#xd7;</button></div>';
      }else{
        o+='<button class="add-link" onclick="pk_add('+c+')">+ Add item</button>';
      }
      o+='</div>';
    }
  }else{
    o+='<div class="card">';
    for(var j=0;j<TDDATA.length;j++){
      var td=TDDATA[j],isPend=DEL_TD[j];
      o+='<div class="pk-row" style="gap:8px">';
      o+='<div class="chkbox'+(td.done||td.na?' on':'')+'" onclick="td_chk('+j+')" style="cursor:'+(td.na?'default':'pointer')+'">'+(td.done?IC.checkw:td.na?'&ndash;':'')+'</div>';
      o+='<div class="pk-name'+(td.done?' done':'')+'" onclick="td_chk('+j+')" style="cursor:'+(td.na?'default':'pointer')+';opacity:'+(td.na?'.4':'1')+'">'+td.n+'</div>';
      if(td.when) o+='<div class="td-when">'+td.when+'</div>';
      o+='<button onclick="td_na('+j+')" class="na-btn'+(td.na?' active':'')+'">N/A</button>';
      if(isPend){
        o+='<button class="del-confirm-btn" onclick="td_del('+j+')">Remove?</button>';
      }else{
        o+='<button class="del-btn" onclick="td_del('+j+')">&#xd7;</button>';
      }
      o+='</div>';
    }
    if(ADDING_TODO){
      o+='<div class="add-row"><input id="td-inp" class="add-inp" placeholder="Task name..." onkeydown="td_inp_key(event)">';
      o+='<button class="add-ok" onclick="td_ok()">Add</button>';
      o+='<button class="add-cancel" onclick="td_cancel()">&#xd7;</button></div>';
    }else{
      o+='<button class="add-link" onclick="td_add()">+ Add task</button>';
    }
    o+='</div>';
  }
  return o;
}

// ── NAV ───────────────────────────────────────────────────────────────
function renderNav(){
  var tabs=[
    {id:'days',     ic:IC.calendar,  lb:'Days'},
    {id:'schedule', ic:IC.list,      lb:'Schedule'},
    {id:'ll',       ic:IC.zap,       lb:'Lightning'},
    {id:'planning', ic:IC.checksq,   lb:'Planning'}
  ];
  var h='';
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i],on=TAB===t.id;
    h+='<button class="nbtn'+(on?' on':'')+'" onclick="st(\''+t.id+'\')">'+t.ic+'<span>'+t.lb+'</span>'+(on?'<div class="nbtn-dot"></div>':'')+'</button>';
  }
  document.getElementById('bnav').innerHTML=h;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────
function render(){
  renderStrip();
  var o='';
  if(TAB==='days') o=renderDays();
  else if(TAB==='schedule') o=renderSchedule();
  else if(TAB==='ll') o=renderLL();
  else o=renderPlanning();
  document.getElementById('app').innerHTML=o;
  renderNav();
}

render();
</script>
