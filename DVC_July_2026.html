<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVC · July 2026</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DVC 2026">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#1B2B4A">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1B2B4A;--cream:#F7F4EF;--card:#fff;--muted:#6B7280;
  --mk:#6B4FA0;--ep:#0077A8;--hs:#C24530;--ak:#3B7549;--trv:#8C9BAA;
  --gold:#B8892A;--gold-lt:#FEF3C7;--gold-dk:#78350F;
  --border:#E5E1D8;--r:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--cream);color:var(--ink);max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--ink);color:#fff;padding:16px 18px 14px;position:sticky;top:0;z-index:100}
.hdr-title{font-family:Georgia,serif;font-size:19px;font-weight:normal;letter-spacing:.02em}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.strip-wrap{background:var(--ink);padding:0 14px 14px;overflow-x:auto;scrollbar-width:none}
.strip-wrap::-webkit-scrollbar{display:none}
.strip{display:flex;gap:8px;min-width:max-content}
.dpill{display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:10px;cursor:pointer;border:2px solid transparent;background:rgba(255,255,255,.08);min-width:60px;transition:all .15s}
.dpill.on{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.16)}
.p-day{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em}
.p-date{font-size:16px;font-weight:700;color:#fff;margin:1px 0}
.p-dot{width:20px;height:6px;border-radius:3px;margin-top:4px}
.p-pk{font-size:10px;color:rgba(255,255,255,.55);margin-top:3px;font-weight:600;letter-spacing:.04em}
.content{flex:1;padding:14px 14px 80px}
.hero{border-radius:var(--r);padding:16px 18px;color:#fff;margin-bottom:12px}
.h-date{font-size:12px;text-transform:uppercase;letter-spacing:.08em;opacity:.75}
.h-park{font-family:Georgia,serif;font-size:22px;font-weight:normal;margin:4px 0}
.h-sub{font-size:13px;opacity:.8}
.h-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:3px 9px;background:rgba(255,255,255,.2);border-radius:20px;letter-spacing:.04em}
/* Park info bar: hours + crowd */
.park-info{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;display:flex;overflow:hidden}
.pi-cell{flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.pi-cell:not(:last-child){border-right:1px solid var(--border)}
.pi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.pi-val{font-size:14px;font-weight:600;color:var(--ink)}
.pi-tbd{font-size:13px;color:var(--muted);font-style:italic}
/* Crowd dots */
.crowd-dots{display:flex;gap:3px;margin-top:3px}
.cdot{width:8px;height:8px;border-radius:50%}
.alert{background:var(--gold-lt);border-left:4px solid var(--gold);border-radius:8px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:var(--gold-dk);line-height:1.45}
.alert strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;color:var(--gold)}
.card{background:var(--card);border-radius:var(--r);margin-bottom:12px;overflow:hidden;border:1px solid var(--border)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;user-select:none}
.card-lbl{display:flex;align-items:center;gap:9px}
.card-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:var(--muted)}
.chev{font-size:11px;color:var(--muted);transition:transform .2s}
.chev.open{transform:rotate(90deg)}
.card-body{border-top:1px solid var(--border)}
/* Flight section */
.flt-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:14px 16px;align-items:center}
.flt-side{display:flex;flex-direction:column}
.flt-side.right{text-align:right;align-items:flex-end}
.flt-apt{font-size:22px;font-weight:700;letter-spacing:.05em}
.flt-city{font-size:11px;color:var(--muted);margin-top:1px}
.flt-time{font-size:15px;font-weight:600;margin-top:6px}
.flt-date{font-size:11px;color:var(--muted)}
.flt-mid{display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:4px}
.flt-line{display:flex;align-items:center;gap:4px;width:100%}
.flt-dash{flex:1;height:1px;background:var(--border)}
.flt-plane{font-size:14px}
.flt-carrier{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-align:center}
.flt-meta{display:flex;gap:0;border-top:1px solid var(--border)}
.flt-meta-cell{flex:1;padding:10px 14px}
.flt-meta-cell:not(:last-child){border-right:1px solid var(--border)}
.flt-mlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:2px}
.flt-mval{font-size:13px;font-weight:600}
/* Itinerary rows */
.t-row{display:flex;gap:12px;padding:10px 15px;border-bottom:1px solid var(--border);align-items:flex-start}
.t-row:last-child{border-bottom:none}
.t-time{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;min-width:62px;padding-top:2px;white-space:nowrap}
.t-text{font-size:13px;line-height:1.45}
.crit{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;background:#FEE2E2;color:#991B1B;vertical-align:middle;white-space:nowrap}
/* Full details */
.detail-block{padding:12px 15px;font-size:13px;line-height:1.6;color:#374151;border-bottom:1px solid var(--border)}
.detail-block:last-child{border-bottom:none}
.detail-block p{margin-bottom:8px}
.detail-block p:last-child{margin-bottom:0}
.detail-hed{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
/* LL */
.ll-row{padding:11px 15px;border-bottom:1px solid var(--border)}
.ll-row:last-child{border-bottom:none}
.ll-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ll-ride{font-size:13px;font-weight:600}
.ll-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
.sp{background:#FEE2E2;color:#991B1B}
.mp1{background:#DBEAFE;color:#1E40AF}
.mp2{background:#D1FAE5;color:#065F46}
.ll-win{font-size:12px;color:var(--muted);margin-top:3px}
.ll-bd{font-size:11px;color:var(--gold);font-weight:600;margin-top:2px}
.roll-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:11px 15px 6px}
.roll-row{padding:7px 15px;font-size:13px;display:flex;gap:8px}
.roll-row::before{content:"→";color:var(--muted);flex-shrink:0}
/* Dining */
.din-row{display:flex;gap:12px;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border)}
.din-row:last-child{border-bottom:none}
.meal{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:var(--cream);color:var(--muted);padding:3px 8px;border-radius:6px;min-width:64px;text-align:center;flex-shrink:0}
.din-name{font-size:13px;font-weight:600}
.din-time{font-size:12px;color:var(--muted);margin-top:2px}
/* Shows */
.show-row{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--border)}
.show-row:last-child{border-bottom:none}
.show-name{font-size:13px;font-weight:600}
.show-time{font-size:12px;color:var(--muted)}
/* Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;max-width:430px;margin:0 auto;z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 6px 12px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;letter-spacing:.04em;gap:3px;border:none;background:none}
.nbtn.on{color:var(--ink)}
.nicon{font-size:20px;line-height:1}
.ndot{width:4px;height:4px;border-radius:50%;background:var(--ink);margin-top:2px}
.nspc{height:6px}
/* Packing */
.pack-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 15px 8px}
.pk-row{display:flex;align-items:center;gap:12px;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer}
.pk-row:last-child{border-bottom:none}
.chkbox{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.chkbox.on{background:var(--ink);border-color:var(--ink);color:#fff}
.pk-name{font-size:13px}
.pk-name.done{text-decoration:line-through;color:var(--muted)}
.lkr{font-size:10px;color:var(--gold);font-weight:600;margin-left:auto}
/* LL page */
.llp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.llp-hd{padding:12px 15px;display:flex;align-items:center;gap:10px}
.llp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.llp-name{font-size:14px;font-weight:700}
.llp-bd{font-size:12px;color:var(--gold);font-weight:600;margin-left:auto;white-space:nowrap}
.pg-title{font-family:Georgia,serif;font-size:18px;margin-bottom:4px}
.pg-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.seg{display:flex;background:var(--cream);border-radius:8px;padding:3px;gap:3px;margin-bottom:14px;border:1px solid var(--border)}
.seg-btn{flex:1;padding:8px;font-size:13px;font-weight:600;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--muted)}
.seg-btn.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.sch-day-hd{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--border)}
.sch-day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sch-day-name{font-size:14px;font-weight:700}
.sch-day-date{font-size:12px;color:var(--muted);margin-left:auto}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">DVC — July 2026</div>

<div id="app"></div>

<script>

  ak: {name:"Animal Kingdom",  color:"#3B7549",short:"AK", e:"🦁"}
};

var DAYS = [
  // ── Jul 14  TRAVEL ──────────────────────────────────────────────
  { date:"14", dl:"Tue", park:"trv",
    badges:["Locker Delivered to Room","Activate APs"],
    alert:null,
    res:"ep", crowd: null, hours: null,
    flight:{
      num:"SW 4657 / 3658", conf:"CCSJ4H",
      dep:"5:45 AM", depApt:"BOS", depCity:"Boston",
      arr:"11:50 AM", arrApt:"MCO", arrCity:"Orlando"
    },
    itin:[
      {t:"5:45 AM",   x:"Depart BOS"},
      {t:"11:50 AM",  x:"Arrive MCO"},
      {t:"Afternoon", x:"Check in Boardwalk Villa 1BR · Activate APs · Owners Locker delivered to room"},
      {t:"Evening",   x:"Epcot (Park Reservation)"}
    ],
    strategy: null,
    shows:[], ll:[], roll:[],
    din:[]
  },

  // ── Jul 15  HOLLYWOOD STUDIOS (solo/relaxed) ────────────────────
  { date:"15", dl:"Wed", park:"hs",
    badges:["Relaxed Day"],
    alert: null,
    res:"hs", crowd: null, hours: null,
    flight: null,
    itin:[
      {t:"11:00 AM", x:"Baseline Tap House"},
      {t:"Noon",     x:"TuneIn Lounge"},
      {t:"~12:30",   x:"Hollywood Brown Derby Lounge — lunch"},
      {t:"Afternoon",x:"Explore at own pace"}

    strategy:"Relaxed day at Hollywood Studios with no must-dos or pre-booked LLs. Good opportunity to wander Echo Lake and Grand Avenue. Baseline Tap House has a strong craft beer selection and is shaded. TuneIn Lounge is right next door — great theming and solid cocktails. Brown Derby Lounge does not require a reservation and has a nice abbreviated menu vs. the full restaurant.",
    shows:[], ll:[], roll:[],
    din:[
      {m:"Lunch",  n:"Hollywood Brown Derby Lounge", t:"~12:30 PM"},
      {m:"Dinner", n:"Bourbon Steak",                t:"7:00 PM"}
    ]
  },

  // ── Jul 16  MAGIC KINGDOM ───────────────────────────────────────
  { date:"16", dl:"Thu", park:"mk",
    badges:["Early Entry 8:30 AM","Multi Pass Day"],
    alert:"7:45 AM at the tap stiles. Don't slip on this — the whole morning depends on it.",
    res:"mk", crowd: null, hours: null,
    flight: null,
    itin:[
      {t:"7:45 AM",  x:"At tap stiles",                                        crit:"⚡ CRITICAL"},
      {t:"8:30 AM",  x:"Early Entry → Tiana's (walk-on)"},
      {t:"9:00 AM",  x:"Big Thunder Mountain (walk-on)"},
      {t:"9:30 AM",  x:"Space Mountain standby"},
      {t:"10:00 AM", x:"Tron (Single Pass window)"},
      {t:"10:30 AM", x:"Jungle Cruise (MP T1) → rebook Buzz"},
      {t:"11:00 AM", x:"Pirates (MP T2) → rebook nighttime ride #1"},
      {t:"11:30 AM", x:"Tiki Room (walk-on)"},
      {t:"12:00 PM", x:"Haunted Mansion (MP T2) → rebook nighttime ride #2"},
      {t:"12:30 PM", x:"It's a Small World"},
      {t:"~1:00 PM", x:"Buzz Lightyear (MP window lands)"},
      {t:"1:30 PM",  x:"DVC Lounge · Lunch · Main Street"},
      {t:"~2:30 PM", x:"Resort — swim / rest"},
      {t:"Evening",  x:"Return: Monorail Crawl + fireworks + 2 nighttime re-rides"}
    ],
    strategy:"By roughly 1:00 PM the full must-do list is done: Tiana's, Thunder, Space, Tron, Jungle, Pirates, Tiki, Haunted, Small World — plus Buzz from the nice-to-haves. That's 10 rides in a morning with minimal waiting, all driven by the rolling re-book engine.\n\nMonorail Crawl in the evening: ride the resort monorail and hop off at Polynesian, Grand Floridian, and Contemporary for a drink at each before looping back to MK for the fireworks and your two banked nighttime re-rides.\n\nHayley and Cian should also buy Multi Pass on Jul 9 @ 7 AM. Everyone buys Single Pass for Tron at the same time.\n\nIf Tron Single Pass sells out before 7 AM purchase: Tron's standby wait drops during fireworks or the final hour, but you'd trade fireworks for it. Keep the Single Pass.\n\nFree look at the MK no-Multi-Pass strategy is in the Lightning tab under 'MK No Multi Pass' if needed.",
    shows:[
      {n:"MK Starlight",        t:"8:30 & 10:30 PM"},
      {n:"Happily Ever After",  t:"9:30 PM"}
    ],
    ll:[
      {ty:"sp",  r:"Tron",                    w:"~10:00–10:30 AM", bd:"Jul 9 @ 7:00 AM"},
      {ty:"mp1", r:"Jungle Cruise",            w:"~10:30–11:00 AM", bd:"Jul 9 @ 7:00 AM"},
      {ty:"mp2", r:"Pirates of the Caribbean", w:"~11:00–11:30 AM", bd:"Jul 9 @ 7:00 AM"},
      {ty:"mp2", r:"Haunted Mansion",          w:"~12:00–12:30 PM", bd:"Jul 9 @ 7:00 AM"}
    ],
    roll:[
      "After Jungle → book Buzz Lightyear",
      "After Pirates → nighttime re-ride #1",
      "After Haunted → nighttime re-ride #2"
    ],
    din:[{m:"Dinner", n:"Monorail Crawl", t:"Evening"}]
  },

  // ── Jul 17  EPCOT ───────────────────────────────────────────────
  { date:"17", dl:"Fri", park:"ep",
    badges:["Single Pass Day"],
    alert: null,
    res:"ep", crowd: null, hours: null,
    flight: null,
    itin:[
      {t:"8:20 AM",  x:"Walk BoardWalk → International Gateway"},
      {t:"8:30 AM",  x:"Enter at France"},
      {t:"9:00 AM",  x:"Breakfast at Les Halles (France pavilion)"},
      {t:"9:45 AM",  x:"Test Track (standby or single rider)"},
      {t:"10:30 AM", x:"Guardians of the Galaxy (Single Pass window)"},
      {t:"11:15 AM", x:"Soarin'"},
      {t:"12:00 PM", x:"Figment (walk-on) → The Seas / Nemo (walk-on)"},
      {t:"12:45 PM", x:"Lunch in World Showcase"},
      {t:"1:30 PM",  x:"Gran Fiesta Tour — Mexico (walk-on)"},
      {t:"2:00 PM",  x:"Exit via International Gateway → BoardWalk"},
      {t:"2–5 PM",   x:"Pool break / rest through peak heat"},
      {t:"5:00 PM",  x:"Re-enter International Gateway · drink around World Showcase"},
      {t:"9:00 PM",  x:"Luminous → stroll back to BoardWalk"}
    ],
    strategy:"Enter via International Gateway (the back entrance right off the BoardWalk) rather than the main Epcot entrance. This puts you at France first, which is where breakfast is anyway.\n\nTest Track: standby is manageable early. Single rider is an option if the group doesn't mind splitting for one ride.\n\nMorning block completes the full ride list — Test Track, Guardians, Soarin', Figment, Seas, Gran Fiesta — by about 2 PM. Indiana Jones at 12 then Star Tours is also an option in this window if the group wants more.\n\nThe afternoon storm window in July hits reliably around 3–4 PM. Pool/rest through it and re-enter refreshed at 5 PM. World Showcase drinking: Mexico → Norway → China → Germany → Italy → America → Japan → Morocco → France → UK → Canada. Don't need to hit every pavilion — pick favorites.\n\nDVC Lounge is accessible from Epcot. Check hours.",
    shows:[{n:"Luminous", t:"9:00 PM"}],
    ll:[{ty:"sp", r:"Guardians of the Galaxy", w:"~10:30–11:00 AM", bd:"Jul 10 @ 7:00 AM"}],
    roll:[],
    din:[
      {m:"Breakfast", n:"Les Halles — France Pavilion", t:"9:00 AM"},
      {m:"Lunch",     n:"World Showcase",               t:"~12:45 PM"},
      {m:"Dinner",    n:"Cake Bake",                    t:"TBD"}
    ]
  },

  // ── Jul 18  HOLLYWOOD STUDIOS (main HS day) ─────────────────────
  { date:"18", dl:"Sat", park:"hs",
    badges:["Early Entry 8:30 AM","Multi Pass Day"],
    alert:"Hayley &amp; Cian also buy Multi Pass on Jul 11 @ 7 AM. Rise is optional — decide before booking day.",
    res:"hs", crowd: null, hours: null,
    flight: null,
    itin:[
      {t:"8:00 AM",  x:"Arrive, tap in for 8:30 Early Entry"},
      {t:"8:30 AM",  x:"Slinky Dog Dash standby (Early Entry — best free shot at it)"},
      {t:"9:30 AM",  x:"Muppets Coaster (MP T1) → rebook Runaway Railway",  crit:"⚡"},
      {t:"10:00 AM", x:"Rise of the Resistance (Single Pass window)"},
      {t:"10:45 AM", x:"Tower of Terror (MP T2) → rebook nighttime ride",   crit:"⚡"},
      {t:"11:30 AM", x:"Toy Story Mania (MP T2) → rebook one more",         crit:"⚡"},
      {t:"12:00 PM", x:"Star Tours"},
      {t:"12:30 PM", x:"Baseline → TuneIn Lounge → Brown Derby Lounge"},
      {t:"~2:30 PM", x:"Back to BoardWalk — afternoon break"},
      {t:"Evening",  x:"Return for nighttime re-books + night shows"}
    ],
    strategy:"Muppets coaster, Tower, and Rise all share the Sunset Boulevard / Echo Lake real estate — very little backtracking in the morning. The whole must-do list (Muppets, Tower, Toy Story, Star Tours, plus Slinky and Rise if grabbed) is done by noon.\n\nKeep using the rolling re-book engine after Toy Story Mania — on a Multi Pass day you can keep stacking one-at-a-time bookings. If the group wants to re-ride the coaster or Tower at night, book the window midday for an evening slot.\n\nHS is a short walk or boat ride from the BoardWalk, so the mid-day break and return trip are easy. Boat from Epcot/Hollywood Studios dock takes about 10 minutes.\n\nNight shows on Sunset Boulevard: stake a spot early or ride during the show when standby waits drop. Fantasmic has two showings — if first is crowded, second showing is often easier to get into.",
    shows:[
      {n:"Movie Magic",                   t:"8:30 PM"},
      {n:"Fantasmic!",                    t:"8:30 & 10:00 PM"},
      {n:"Wonderful World of Animation",  t:"9:00 PM"}
    ],
    ll:[
      {ty:"sp",  r:"Rise of the Resistance",           w:"~9:30–10:30 AM",  bd:"Jul 11 @ 7:00 AM"},
      {ty:"mp1", r:"Rock 'n' Roller Coaster (Muppets)", w:"~9:30–10:00 AM",  bd:"Jul 11 @ 7:00 AM"},
      {ty:"mp2", r:"Tower of Terror",                   w:"~10:45–11:00 AM", bd:"Jul 11 @ 7:00 AM"},
      {ty:"mp2", r:"Toy Story Mania",                   w:"~11:00–11:30 AM", bd:"Jul 11 @ 7:00 AM"}
    ],
    roll:[
      "After Muppets Coaster → book Runaway Railway",
      "After Tower of Terror → book Star Tours or Slinky",
      "After Toy Story Mania → book nighttime re-ride"
    ],
    din:[
      {m:"Lunch",  n:"Cake Bake",     t:"~12:30 PM"},
      {m:"Dinner", n:"Summer House?", t:"TBD"}
    ]
  },

  // ── Jul 19  ANIMAL KINGDOM ──────────────────────────────────────
  { date:"19", dl:"Sun", park:"ak",
    badges:["Drop Locker at Front Desk","Last Day"],
    alert: null,
    res:"ak", crowd: null, hours: null,
    flight: null,
    itin:[
      {t:"Morning",   x:"Drop Owners Locker at front desk"},
      {t:"Rope Drop", x:"Animal Kingdom"},
      {t:"Afternoon", x:"Final rides · head to MCO"}
    ],
    strategy: null,
    shows:[], ll:[], roll:[],
    din:[]
  }
];

var PACKING = [
  { cat:"Clothes",   items:[{n:"Shorts"},{n:"T-Shirts"},{n:"Bathing Suits"},{n:"Sneakers"},{n:"Crocs",l:true},{n:"Sweat Shirts",l:true},{n:"PJs"},{n:"Belt"}]},
  { cat:"Electronics", items:[{n:"AirPods"},{n:"Phone"},{n:"Power Strip",l:true},{n:"Roku + Cables",l:true},{n:"Bluetooth Speaker",l:true},{n:"Portable Charger",l:true}]},
  { cat:"Misc", items:[{n:"Ponchos",l:true},{n:"Sunglasses"},{n:"Pins & Lanyards",l:true},{n:"Sunblock",l:true},{n:"Cash for Tips"},{n:"Visor",l:true},{n:"Hat",l:true}]},
  { cat:"Paperwork", items:[{n:"Annual Pass Cards"},{n:"Magic Bands"},{n:"Boarding Passes"},{n:"Gift Cards"},{n:"Credit Cards"},{n:"DVC Cards"}]},
  { cat:"Health", items:[{n:"Creon"},{n:"Pepcid AC"},{n:"Advil"},{n:"Pepto / Mylanta"},{n:"Tylenol"},{n:"Tums"},{n:"Chapstick"},{n:"Gax-X"}]}
];

var TODOS = [
  {n:"Book Hotel",                              s:"Done"},
  {n:"Book Flight",                             s:"Done"},
  {n:"Park Tickets",                            s:"Done"},
  {n:"Park Reservations",                       s:"Done"},
  {n:"Dining Reservations",                     s:"Done"},
  {n:"Room Request",                            s:"Done"},
  {n:"Owners Locker",                           s:"Done"},
  {n:"Resort Online Check-in",                  s:"Done"},
  {n:"Airline Online Check-in / Boarding Pass", s:""},
  {n:"Magic Bands",                             s:"N/A"},
  {n:"Order Groceries",                         s:"N/A"}
];

var LL_PARKS = [
  { nm:"Magic Kingdom", clr:"#6B4FA0", bd:"Jul 9 @ 7:00 AM ET",
    items:[
      {ty:"sp", r:"Tron",                    w:"~10:00–10:30 AM"},
      {ty:"mp1",r:"Jungle Cruise",            w:"~10:30–11:00 AM"},
      {ty:"mp2",r:"Pirates of the Caribbean", w:"~11:00–11:30 AM"},
      {ty:"mp2",r:"Haunted Mansion",          w:"~12:00–12:30 PM"}
    ],
    roll:["After Jungle → book Buzz Lightyear","After Pirates → nighttime re-ride #1","After Haunted → nighttime re-ride #2"]
  },
  { nm:"EPCOT", clr:"#0077A8", bd:"Jul 10 @ 7:00 AM ET",
    items:[{ty:"sp",r:"Guardians of the Galaxy",w:"~10:30–11:00 AM"}],
    roll:[]
  },
  { nm:"Hollywood Studios", clr:"#C24530", bd:"Jul 11 @ 7:00 AM ET",
    items:[
      {ty:"sp", r:"Rise of the Resistance",           w:"~9:30–10:30 AM"},
      {ty:"mp1",r:"Rock 'n' Roller Coaster (Muppets)", w:"~9:30–10:00 AM"},
      {ty:"mp2",r:"Tower of Terror",                   w:"~10:45–11:00 AM"},
      {ty:"mp2",r:"Toy Story Mania",                   w:"~11:00–11:30 AM"}
    ],
    roll:["After Muppets Coaster → book Runaway Railway","After Tower of Terror → book Star Tours or Slinky","After Toy Story Mania → book nighttime re-ride"]
  }
];

// ── STATE ───────────────────────────────────────────────────────────
var AD  = 0;   // start on travel day so flight section is visible
var TAB = "days";
var OPEN = {flight:true, res:false, itin:true, details:false, ll:false, din:false, shows:false};
var CHK  = {};
var PLAN = "packing";

function sd(i){ AD=i; OPEN={flight:true,res:false,itin:true,details:false,ll:false,din:false,shows:false}; render(); }
function st(t){ TAB=t; render(); }
function tg(k){ OPEN[k]=!OPEN[k]; render(); }
function tc(k){ CHK[k]=!CHK[k]; render(); }
function sp(p){ PLAN=p; render(); }

function tagCls(ty){ return ty==="sp"?"sp":ty==="mp1"?"mp1":"mp2"; }
function tagLbl(ty){ return ty==="sp"?"Single Pass":ty==="mp1"?"Multi Pass T1":"Multi Pass T2"; }

function crowdDots(val){
  if(val===null) return "<span class='pi-tbd'>TBD</span>";
  var s="<div class='crowd-dots'>";
  for(var i=1;i<=10;i++){
    var fill = i<=val ? (val<=3?"#22c55e":val<=6?"#f59e0b":"#ef4444") : "#E5E1D8";
    s+="<div class='cdot' style='background:"+fill+"'></div>";
  }
  return s+"</div><div style='font-size:11px;color:var(--muted);margin-top:2px'>"+val+" / 10</div>";
}

// ── RENDER ──────────────────────────────────────────────────────────
function render(){
  var day=DAYS[AD], pk=PARKS[day.park];

  // Strip
  var strip="<div class='strip-wrap'><div class='strip'>";
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i], p=PARKS[d.park];
    strip+="<div class='dpill"+(i===AD?" on":"")+"' onclick='sd("+i+")'>"
          +"<div class='p-day'>"+d.dl+"</div>"
          +"<div class='p-date'>"+d.date+"</div>"
          +"<div class='p-dot' style='background:"+p.color+"'></div>"
          +"<div class='p-pk'>"+p.short+"</div></div>";
  }
  strip+="</div></div>";
  document.getElementById("strip").innerHTML=(TAB==="days")?strip:"";

  var out="";

  if(TAB==="days"){
    // Hero
    out+="<div class='hero' style='background:"+pk.color+"'>"
        +"<div class='h-date'>Jul "+day.date+" \u00b7 "+day.dl+"</div>"
        +"<div class='h-park'>"+pk.e+" "+pk.name+"</div>"
        +"<div class='h-sub'>Boardwalk Villa</div>"
        +"<div class='h-badges'>";
    for(var b=0;b<day.badges.length;b++) out+="<span class='badge'>"+day.badges[b]+"</span>";
    out+="</div></div>";

    // Park info bar (hours + crowd) — only for park days
    if(day.park!=="trv"){
      out+="<div class='park-info'>"
          +"<div class='pi-cell'><div class='pi-label'>Park Hours</div>"
          +(day.hours?"<div class='pi-val'>"+day.hours+"</div>":"<div class='pi-tbd'>TBD</div>")
          +"</div>"
          +"<div class='pi-cell'><div class='pi-label'>Crowd Level</div>"
          +crowdDots(day.crowd)
          +"</div></div>";
    }

    // Alert
    if(day.alert) out+="<div class='alert'><strong>\u26a0 Heads Up</strong>"+day.alert+"</div>";

    // Park Reservation card
    var resPk=PARKS[day.res];
    out+="<div class='card'>"
        +"<div class='card-hd' onclick=\"tg('res')\">"
        +"<div class='card-lbl'><div class='card-icon' style='background:#F0F4FF'>\uD83C\uDFAB</div>"
        +"<div><div class='card-title'>Park Reservation</div>"
        +"<div class='card-sub'>"+resPk.name+"</div></div></div>"
        +"<div class='chev"+(OPEN.res?" open":"")+"'>\u25b6</div></div>";
    if(OPEN.res){
      out+="<div class='card-body'>"
          +"<div class='din-row' style='gap:14px;align-items:center'>"
          +"<div style='width:12px;height:12px;border-radius:50%;background:"+resPk.color+";flex-shrink:0'></div>"
          +"<div><div class='din-name'>"+resPk.name+"</div>"
          +"<div class='din-time'>Jul "+day.date+" &nbsp;\u00b7&nbsp; Status: Confirmed</div></div>"
          +"</div></div>";
    }
    out+="</div>";
    if(day.flight){
      var f=day.flight;
      out+="<div class='card'>"
          +"<div class='card-hd' onclick=\"tg('flight')\">"
          +"<div class='card-lbl'><div class='card-icon' style='background:#EFF6FF'>\u2708\uFE0F</div>"
          +"<div><div class='card-title'>Flight</div>"
          +"<div class='card-sub'>"+f.num+" &nbsp;\u00b7&nbsp; Conf: "+f.conf+"</div></div></div>"
          +"<div class='chev"+(OPEN.flight?" open":"")+"'>\u25b6</div></div>";
      if(OPEN.flight){
        out+="<div class='card-body'>"
            +"<div class='flt-grid'>"
            +"<div class='flt-side'>"
            +"<div class='flt-apt'>"+f.depApt+"</div>"
            +"<div class='flt-city'>"+f.depCity+"</div>"
            +"<div class='flt-time'>"+f.dep+"</div>"
            +"<div class='flt-date'>Jul 14</div>"
            +"</div>"
            +"<div class='flt-mid'>"
            +"<div class='flt-line'><div class='flt-dash'></div><div class='flt-plane'>\u2708</div><div class='flt-dash'></div></div>"
            +"<div class='flt-carrier'>Southwest</div>"
            +"</div>"
            +"<div class='flt-side right'>"
            +"<div class='flt-apt'>"+f.arrApt+"</div>"
            +"<div class='flt-city'>"+f.arrCity+"</div>"
            +"<div class='flt-time'>"+f.arr+"</div>"
            +"<div class='flt-date'>Jul 14</div>"
            +"</div></div>"
            +"<div class='flt-meta'>"
            +"<div class='flt-meta-cell'><div class='flt-mlabel'>Flight</div><div class='flt-mval'>"+f.num+"</div></div>"
            +"<div class='flt-meta-cell'><div class='flt-mlabel'>Confirmation</div><div class='flt-mval'>"+f.conf+"</div></div>"
            +"</div></div>";
      }
      out+="</div>";
    }

    // Itinerary card
    out+="<div class='card'>"
        +"<div class='card-hd' onclick=\"tg('itin')\">"
        +"<div class='card-lbl'><div class='card-icon' style='background:#EEF2FF'>\uD83D\uDCCB</div>"
        +"<div><div class='card-title'>Day Plan</div><div class='card-sub'>"+day.itin.length+" stops</div></div></div>"
        +"<div class='chev"+(OPEN.itin?" open":"")+"'>\u25b6</div></div>";
    if(OPEN.itin){
      out+="<div class='card-body'>";
      for(var j=0;j<day.itin.length;j++){
        var it=day.itin[j];
        out+="<div class='t-row'><div class='t-time'>"+it.t+"</div>"
            +"<div class='t-text'>"+it.x+(it.crit?"<span class='crit'>"+it.crit+"</span>":"")+"</div></div>";
      }
      out+="</div>";
    }
    out+="</div>";

    // Full details / strategy card
    if(day.strategy){
      out+="<div class='card'>"
          +"<div class='card-hd' onclick=\"tg('details')\">"
          +"<div class='card-lbl'><div class='card-icon' style='background:#F0FDF4'>\uD83D\uDCDD</div>"
          +"<div><div class='card-title'>Full Strategy &amp; Notes</div><div class='card-sub'>Tap to expand</div></div></div>"
          +"<div class='chev"+(OPEN.details?" open":"")+"'>\u25b6</div></div>";
      if(OPEN.details){
        var paras=day.strategy.split("\n\n");
        out+="<div class='card-body'><div class='detail-block'>";
        for(var p=0;p<paras.length;p++) out+="<p>"+paras[p]+"</p>";
        out+="</div></div>";
      }
      out+="</div>";
    }

    // LL card
    if(day.ll.length>0){
      out+="<div class='card'>"
          +"<div class='card-hd' onclick=\"tg('ll')\">"
          +"<div class='card-lbl'><div class='card-icon' style='background:#FEF3C7'>\u26a1</div>"
          +"<div><div class='card-title'>Lightning Lanes</div><div class='card-sub'>"+day.ll.length+" pre-booked \u00b7 "+day.roll.length+" rolling</div></div></div>"
          +"<div class='chev"+(OPEN.ll?" open":"")+"'>\u25b6</div></div>";
      if(OPEN.ll){
        out+="<div class='card-body'>";
        for(var j=0;j<day.ll.length;j++){
          var ll=day.ll[j];
          out+="<div class='ll-row'>"
              +"<div class='ll-top'><div class='ll-ride'>"+ll.r+"</div><div class='ll-tag "+tagCls(ll.ty)+"'>"+tagLbl(ll.ty)+"</div></div>"
              +"<div class='ll-win'>Window: "+ll.w+"</div>"
              +"<div class='ll-bd'>Book: "+ll.bd+"</div></div>";
        }
        if(day.roll.length>0){
          out+="<div class='roll-hd'>Rolling Re-books</div>";
          for(var j=0;j<day.roll.length;j++) out+="<div class='roll-row'>"+day.roll[j]+"</div>";
        }
        out+="</div>";
      }
      out+="</div>";
    }

    // Dining Plan card
    if(day.din.length>0){
      out+="<div class='card'>"
          +"<div class='card-hd' onclick=\"tg('din')\">"
          +"<div class='card-lbl'><div class='card-icon' style='background:#FEF2F2'>\uD83C\uDF7D</div>"
          +"<div><div class='card-title'>Dining Plan</div><div class='card-sub'>"+day.din.length+" in plan</div></div></div>"
          +"<div class='chev"+(OPEN.din?" open":"")+"'>\u25b6</div></div>";
      if(OPEN.din){
        out+="<div class='card-body'>";
        for(var j=0;j<day.din.length;j++){
          var d2=day.din[j];
          out+="<div class='din-row'><div class='meal'>"+d2.m+"</div>"
              +"<div><div class='din-name'>"+d2.n+"</div><div class='din-time'>"+d2.t+"</div></div></div>";
        }
        out+="</div>";
      }
      out+="</div>";
    }

    // Night shows card
    if(day.shows.length>0){
      out+="<div class='card'>"
          +"<div class='card-hd' onclick=\"tg('shows')\">"
          +"<div class='card-lbl'><div class='card-icon' style='background:#F3E8FF'>\u2728</div>"
          +"<div><div class='card-title'>Night Shows</div><div class='card-sub'>"+day.shows.length+" show"+(day.shows.length>1?"s":"")+"</div></div></div>"
          +"<div class='chev"+(OPEN.shows?" open":"")+"'>\u25b6</div></div>";
      if(OPEN.shows){
        out+="<div class='card-body'>";
        for(var j=0;j<day.shows.length;j++){
          var sh=day.shows[j];
          out+="<div class='show-row'><div class='show-name'>"+sh.n+"</div><div class='show-time'>"+sh.t+"</div></div>";
        }
        out+="</div>";
      }
      out+="</div>";
    }

  } else if(TAB==="schedule"){
    // ── PARK RESERVATIONS ────────────────────────────────────────────
    out+="<div class='pg-title'>Trip Schedule</div><div class='pg-sub'>Park reservations \u00b7 dining plan \u00b7 all days</div>";
    out+="<div class='llp-card'>"
        +"<div class='llp-hd'><div style='font-size:16px'>\uD83C\uDFAB</div>"
        +"<div class='llp-name'>Park Reservations</div></div>"
        +"<div style='border-top:1px solid var(--border)'>";
    for(var i=0;i<DAYS.length;i++){
      var d=DAYS[i], rp=PARKS[d.res];
      out+="<div class='din-row'>"
          +"<div style='display:flex;align-items:center;gap:8px;min-width:110px'>"
          +"<div style='width:10px;height:10px;border-radius:50%;background:"+rp.color+";flex-shrink:0'></div>"
          +"<div style='font-size:13px;font-weight:700;color:var(--muted)'>Jul "+d.date+" \u00b7 "+d.dl+"</div></div>"
          +"<div><div class='din-name'>"+rp.name+"</div>"
          +"<div class='din-time'>Confirmed</div></div></div>";
    }
    out+="</div></div>";

    // ── DINING PLAN ──────────────────────────────────────────────────
    out+="<div class='llp-card'>"
        +"<div class='llp-hd'><div style='font-size:16px'>\uD83C\uDF7D</div>"
        +"<div class='llp-name'>Dining Plan</div></div>"
        +"<div style='border-top:1px solid var(--border)'>";
    for(var i=0;i<DAYS.length;i++){
      var d=DAYS[i];
      if(d.din.length===0) continue;
      var rp=PARKS[d.res];
      out+="<div class='sch-day-hd'>"
          +"<div class='sch-day-dot' style='background:"+rp.color+"'></div>"
          +"<div class='sch-day-name'>"+rp.name+"</div>"
          +"<div class='sch-day-date'>Jul "+d.date+" \u00b7 "+d.dl+"</div></div>";
      for(var j=0;j<d.din.length;j++){
        var dn=d.din[j];
        out+="<div class='din-row'>"
            +"<div class='meal'>"+dn.m+"</div>"
            +"<div><div class='din-name'>"+dn.n+"</div>"
            +"<div class='din-time'>"+dn.t+"</div></div></div>";
      }
    }
    out+="</div></div>";

  } else if(TAB==="ll"){
    out+="<div class='pg-title'>Lightning Lane Strategy</div><div class='pg-sub'>Pre-book dates \u00b7 rolling re-books \u00b7 all parks</div>";
    for(var pi=0;pi<LL_PARKS.length;pi++){
      var lp=LL_PARKS[pi];
      out+="<div class='llp-card'>"
          +"<div class='llp-hd'><div class='llp-dot' style='background:"+lp.clr+"'></div>"
          +"<div class='llp-name'>"+lp.nm+"</div><div class='llp-bd'>"+lp.bd+"</div></div>"
          +"<div style='border-top:1px solid var(--border)'>";
      for(var j=0;j<lp.items.length;j++){
        var it=lp.items[j];
        out+="<div class='ll-row'>"
            +"<div class='ll-top'><div class='ll-ride'>"+it.r+"</div><div class='ll-tag "+tagCls(it.ty)+"'>"+tagLbl(it.ty)+"</div></div>"
            +"<div class='ll-win'>Window: "+it.w+"</div></div>";
      }
      if(lp.roll.length>0){
        out+="<div class='roll-hd'>Rolling Re-books</div>";
        for(var j=0;j<lp.roll.length;j++) out+="<div class='roll-row'>"+lp.roll[j]+"</div>";
      }
      out+="</div></div>";
    }

  } else if(TAB==="planning"){
    out+="<div class='seg'>"
        +"<button class='seg-btn"+(PLAN==="packing"?" on":"")+"' onclick=\"sp('packing')\">Packing List</button>"
        +"<button class='seg-btn"+(PLAN==="todo"?" on":"")+"' onclick=\"sp('todo')\">To Do</button>"
        +"</div>";
    if(PLAN==="packing"){
      for(var c=0;c<PACKING.length;c++){
        var cat=PACKING[c];
        out+="<div class='card'><div class='pack-cat'>"+cat.cat+"</div>";
        for(var j=0;j<cat.items.length;j++){
          var it=cat.items[j], key="pk-"+c+"-"+j, done=!!CHK[key];
          out+="<div class='pk-row' onclick=\"tc('"+key+"')\">"
              +"<div class='chkbox"+(done?" on":"")+"'>"+(done?"\u2713":"")+"</div>"
              +"<div class='pk-name"+(done?" done":"")+"'>"+it.n+"</div>"
              +(it.l?"<div class='lkr'>\uD83D\uDD12 Locker</div>":"")
              +"</div>";
        }
        out+="</div>";
      }
    } else {
      out+="<div class='card'>";
      for(var j=0;j<TODOS.length;j++){
        var td=TODOS[j], na=td.s==="N/A", done=td.s==="Done"||!!CHK["td-"+j];
        var click = na ? "" : " onclick=\"tc('td-"+j+"')\"";
        out+="<div class='pk-row'"+(na?" style='opacity:.45;cursor:default'":"")+click+">"
            +"<div class='chkbox"+(done?" on":"")+"'>"+(done?"\u2713":"")+"</div>"
            +"<div class='pk-name"+(done?" done":"")+"'>"+td.n+"</div>"
            +(na?"<div class='lkr' style='color:var(--muted)'>N/A</div>":"")
            +"</div>";
      }
      out+="</div>";
    }
  }

  document.getElementById("app").innerHTML="<div class='content'>"+out+"</div>";

  // Nav
  var tabs=[
    {id:"days",     ic:"\uD83D\uDDD3", lb:"Days"},
    {id:"schedule", ic:"\uD83D\uDCCB", lb:"Schedule"},
    {id:"ll",       ic:"\u26A1",       lb:"Lightning"},
    {id:"planning", ic:"\uD83D\uDCDD", lb:"Planning"}
  ];
  var nav="<nav class='bnav'>";
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    nav+="<button class='nbtn"+(TAB===t.id?" on":"")+"' onclick=\"st('"+t.id+"')\">"
        +"<div class='nicon'>"+t.ic+"</div><div>"+t.lb+"</div>"
        +(TAB===t.id?"<div class='ndot'></div>":"<div class='nspc'></div>")
        +"</button>";
  }
  nav+="</nav>";
  var old=document.querySelector(".bnav");
  if(old) old.remove();
  document.body.insertAdjacentHTML("beforeend",nav);
}

render();
</script>
</body>
</html>
